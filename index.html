    <style>
        /* Apply Kantumruy Pro globally */
        body, button, input, select, textarea, h1, h2, h3, h4, h5, h6 {
            font-family: 'Kantumruy Pro', 'Battambang', sans-serif;
        }
        
        .hero-bg {
            background-image: linear-gradient(rgba(15, 32, 67, 0.75), rgba(10, 25, 47, 0.85)), url('https://images.unsplash.com/photo-1517677208171-0bc6742058e6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }
        
        /* Bubble Animation */
        .bubbles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            top: 0;
            left: 0;
        }
        .bubble {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            opacity: 0.6;
            animation: rise 12s infinite ease-in;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        .bubble:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-duration: 8s; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 40px; height: 40px; left: 20%; animation-duration: 5s; animation-delay: 1s; }
        .bubble:nth-child(3) { width: 50px; height: 50px; left: 35%; animation-duration: 7s; animation-delay: 2s; }
        .bubble:nth-child(4) { width: 80px; height: 80px; left: 50%; animation-duration: 11s; animation-delay: 0s; }
        .bubble:nth-child(5) { width: 35px; height: 35px; left: 55%; animation-duration: 6s; animation-delay: 1s; }
        .bubble:nth-child(6) { width: 45px; height: 45px; left: 65%; animation-duration: 8s; animation-delay: 3s; }
        .bubble:nth-child(7) { width: 90px; height: 90px; left: 70%; animation-duration: 12s; animation-delay: 2s; }
        .bubble:nth-child(8) { width: 25px; height: 25px; left: 80%; animation-duration: 6s; animation-delay: 2s; }
        .bubble:nth-child(9) { width: 15px; height: 15px; left: 70%; animation-duration: 5s; animation-delay: 1s; }
        .bubble:nth-child(10) { width: 90px; height: 90px; left: 25%; animation-duration: 10s; animation-delay: 4s; }

        @keyframes rise {
            0% {
                bottom: -100px;
                transform: translateX(0);
            }
            50% {
                transform: translateX(50px);
            }
            100% {
                bottom: 100%;
                transform: translateX(-100px);
            }
        }
        
        /* Custom styles for icon containers */
        .process-icon-wrapper {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            border: 4px solid #fff;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1), 0 4px 6px -2px rgba(37, 99, 235, 0.05);
            background-color: #eff6ff; /* blue-50 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2563eb; /* blue-600 */
            transition: all 0.3s ease;
        }

        .process-card:hover .process-icon-wrapper {
            transform: scale(1.1) rotate(5deg);
            background-color: #dbeafe;
        }
        
        .service-icon-wrapper {
            height: 160px;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .group:hover .service-icon-wrapper {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
        }
    </style>
</head>

                            `💵 តម្លៃសរុបប្រហាក់ប្រហែល៖ ${total.toLocaleString()}៛ (ប្រហែល $${(total / 4000).toFixed(2)})`;
                
                const encodedText = encodeURIComponent(msg);
                window.open(`https://t.me/MomHandLaundry?text=${encodedText}`, '_blank');
                setOrderSuccess(true);
                setTimeout(() => setOrderSuccess(false), 5000);

            return (
